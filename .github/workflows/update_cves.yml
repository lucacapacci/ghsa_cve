name: Update CVE Database

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

permissions:
  contents: write  # Crucial: Allows the runner to commit and push changes back to the repo

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.11'

    - name: Fetch recent advisories and update tree
      run: python3 fetch_and_organize.py
      env:
        # Utilizing the built-in GITHUB_TOKEN to authentication against the API
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add .
        
        # Only commit if changes are present to prevent workflow failure errors
        if ! git diff-index --quiet HEAD; then
          git commit -m "chore: automated CVE database sync [$(date -u +'%Y-%m-%d %H:%M:%S' UTC)]"
          git push
        else
          echo "No new CVE updates detected during this cycle."
        fi
